<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;

            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),
            url("/static/GLBajajLogo.jpg");

            background-size: cover;
            background-position: center;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            color: white;
            width: 300px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .error {
            color: #ff6b6b;
            margin-top: 10px;
        }

        .logo {
            width: 80px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <!-- 🔥 Logo inside card -->
    <img src="/static/GLBajajLogo.jpg" class="logo">

    <h2>Student Portal</h2>

    <form method="post">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="error">
        {{ error }}
    </div>

</div>

</body>
</html>
