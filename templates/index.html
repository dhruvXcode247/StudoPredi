<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }
        form {
            background: white;
            padding: 20px;
            margin: auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input, button {
            margin: 8px;
            padding: 8px;
            width: 90%;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

    <h2>Student Performance Predictor</h2>

    <form action="/predict" method="post">
        <input type="text" name="StudentID" placeholder="Student ID" required>

        <input type="number" name="QuestionsSolved" placeholder="Questions Solved" required>

        <input type="number" name="AssessmentScore" placeholder="Assessment Score" required>

        <input type="number" name="Attendance" placeholder="Attendance %" required>

        <input type="number" step="0.1" name="CGPA" placeholder="CGPA" required>

        <input type="number" name="HackathonsParticipated" placeholder="Hackathons Participated" required>

        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>

</body>
</html>
